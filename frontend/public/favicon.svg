<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Chocolate cake with candle - Chocolate Mine brand favicon -->
  <!-- Cake base (dark chocolate) -->
  <rect x="6" y="24" width="36" height="18" rx="4" fill="#4A2C2A"/>
  <!-- Cake frosting layer (milk chocolate) -->
  <rect x="6" y="24" width="36" height="8" rx="4" fill="#6B3A2E"/>
  <!-- Frosting drip decorations -->
  <path d="M10 24 Q10 28 12 28 Q14 28 14 24" fill="#6B3A2E"/>
  <path d="M18 24 Q18 30 20 30 Q22 30 22 24" fill="#6B3A2E"/>
  <path d="M26 24 Q26 29 28 29 Q30 29 30 24" fill="#6B3A2E"/>
  <path d="M34 24 Q34 27 36 27 Q38 27 38 24" fill="#6B3A2E"/>
  <!-- Cake cream layer -->
  <rect x="8" y="28" width="32" height="3" rx="1.5" fill="#D4A017"/>
  <!-- Cake bottom layer -->
  <rect x="6" y="34" width="36" height="8" rx="4" fill="#3D1F1B"/>
  <!-- Candle -->
  <rect x="22" y="10" width="4" height="14" rx="2" fill="#D4A017"/>
  <!-- Candle flame -->
  <ellipse cx="24" cy="8" rx="3" ry="5" fill="#FF6B35"/>
  <ellipse cx="24" cy="7.5" rx="1.5" ry="3" fill="#FFD700"/>
  <!-- Flame glow -->
  <ellipse cx="24" cy="8" rx="5" ry="7" fill="#FF6B35" opacity="0.15"/>
  <!-- Cherry on top decorations -->
  <circle cx="14" cy="24" r="2.5" fill="#C62828"/>
  <circle cx="34" cy="24" r="2.5" fill="#C62828"/>
  <!-- Chocolate sprinkles -->
  <rect x="12" y="36" width="3" height="1.5" rx="0.75" fill="#D4A017" transform="rotate(-20 12 36)"/>
  <rect x="20" y="37" width="3" height="1.5" rx="0.75" fill="#D4A017" transform="rotate(15 20 37)"/>
  <rect x="28" y="36" width="3" height="1.5" rx="0.75" fill="#D4A017" transform="rotate(-10 28 36)"/>
  <rect x="35" y="37" width="3" height="1.5" rx="0.75" fill="#D4A017" transform="rotate(25 35 37)"/>
</svg>